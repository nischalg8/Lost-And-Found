{% load static %}
{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Lost & Found Portal{% endblock %}</title>

{% tailwind_css %}
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">


<nav class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <a href="{% url 'items:list_items' %}" 
           class="text-2xl font-semibold text-amber-700 tracking-tight">
           Welcome to Pulchowk Campus Lost & Found Portal !
        </a>

        <div class="flex items-center space-x-3 text-sm">

        {% if user.is_authenticated %}

            <a href="{% url 'items:list_items' %}"
               class="px-3 py-2 rounded border border-gray-300 hover:bg-gray-100">
               Home
            </a>

            <a href="{% url 'accounts:logout' %}"
               class="px-3 py-2 rounded bg-gray-800 text-white hover:bg-gray-900">
               Logout
            </a>

        {% else %}

            <a href="{% url 'accounts:login' %}"
               class="px-3 py-2 rounded border border-gray-300 hover:bg-gray-100">
               Login
            </a>

            <a href="{% url 'accounts:signup' %}"
               class="px-3 py-2 rounded bg-amber-600 text-white hover:bg-amber-700">
               Sign Up
            </a>

        {% endif %}

        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-6 py-8">
    <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
        {% block content %}{% endblock %}
    </div>
</main>

</body>
</html>
