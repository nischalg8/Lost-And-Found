{% load static %}
{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Lost & Found{% endblock %}</title>

    {% tailwind_css %}
</head>

<body class="bg-green-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-green-100 shadow-md p-4">
    <div class="container mx-auto flex justify-between items-center">
        
        <!-- Header -->
        <h1 class="text-2xl font-bold text-green-700">
             <a href="{% url 'items:list_items' %}">Lost & Found Portal</a>
        </h1>

        <!-- Links -->
        <div class="space-x-4">
            {% if user.is_authenticated %}
                <a class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"
                   href="{% url 'items:list_items' %}">
                   Home
                </a>
               
                <a class="px-4 py-2 bg-red-400 text-white rounded hover:bg-red-500 transition"
                   href="{% url 'accounts:logout' %}">
                   Logout
                </a>
            {% else %}
                <a class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"
                   href="{% url 'accounts:login' %}">
                   Login
                </a>

                <a class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-green-700 transition"
                   href="{% url 'accounts:signup' %}">
                   Sign Up
                </a>
            {% endif %}
        </div>

    </div>
</nav>

<!-- Content -->
<div class="container mx-auto mt-8 bg-white p-6 rounded-lg shadow">
    {% block content %}{% endblock %}
</div>

</body>
</html>
