{% extends "base.html" %}

{% block title %}Item Form{% endblock %}

{% block content %}

<h2 class="text-2xl font-semibold text-green-700 mb-6">
    {% if form.instance.pk %}
        Update Item
    {% else %}
        Add New Item
    {% endif %}
</h2>

<form method="post" class="space-y-5">

    {% csrf_token %}

    <!-- Name -->
    <div>
        <label class="block mb-1 font-medium">Item Name</label>
        {{ form.name }}
    </div>

    <!-- Description -->
    <div>
        <label class="block mb-1 font-medium">Description</label>
        {{ form.description }}
    </div>

    <!-- Location -->
    <div>
        <label class="block mb-1 font-medium">Location</label>
        {{ form.location }}
    </div>

    <!-- Date -->
    <div>
        <label class="block mb-1 font-medium">Date Found</label>
        {{ form.date_found }}
    </div>

    <!-- Buttons -->
    <div class="space-x-3">

        <button
            type="submit"
            class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600"
        >
            Save
        </button>

        <a
            href="{% url 'items:list_items' %}"
            class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500"
        >
            Cancel
        </a>

    </div>

</form>

{% endblock %}
